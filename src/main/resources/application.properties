spring.application.name=orcacast
spring.jpa.hibernate.ddl-auto=validate
# Configuração do Groq (chat e transcrição)
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai/v1
spring.ai.openai.chat.model=llama-3.3-70b-versatile
spring.ai.openai.audio.transcription.options.model=whisper-large-v3
# Configuração da ElevenLabs (texto-para-voz)
spring.ai.model.audio.speech=elevenlabs
spring.ai.elevenlabs.api-key=${ELEVENLABS_API_KEY}
spring.ai.elevenlabs.tts.options.model=eleven_multilingual_v2
spring.ai.elevenlabs.tts.options.voice-id=cjVigY5qzO86Huf0OWal